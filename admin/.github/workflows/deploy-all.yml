name: Deploy All to Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Create clean deploy folder
        run: |
          mkdir -p /tmp/deploy-hrms
          rsync -a \
            --exclude='.github' \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='skills' \
            --exclude='.zscripts' \
            --exclude='mini-services' \
            --exclude='docs' \
            --exclude='logs' \
            --exclude='upload' \
            --exclude='prisma' \
            --exclude='src' \
            --exclude='public' \
            --exclude='examples' \
            --exclude='db' \
            --exclude='next-env.d.ts' \
            --exclude='composer.lock' \
            --exclude='worklog.md' \
            --exclude='Caddyfile' \
            --exclude='*.md' \
            ./ /tmp/deploy-hrms/

          FILE_COUNT=$(find /tmp/deploy-hrms -type f | wc -l)
          echo "FILE_COUNT=$FILE_COUNT" >> $GITHUB_ENV
          echo "Files to upload: $FILE_COUNT"

      - name: Upload all files via FTP mirror
        run: |
          lftp -c "
          set ftp:ssl-allow no;
          set ftp:passive-mode on;
          set net:timeout 60;
          set net:reconnect-interval-base 5;
          set net:max-retries 5;
          set ftp:use-mdtm off;
          open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }};
          mirror --reverse --overwrite --verbose=1 \
            --exclude='.github/' \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='skills/' \
            --exclude='.zscripts/' \
            --exclude='mini-services/' \
            --exclude='docs/' \
            --exclude='logs/' \
            --exclude='upload/' \
            --exclude='prisma/' \
            --exclude='src/' \
            --exclude='public/' \
            --exclude='examples/' \
            --exclude='db/' \
            --exclude='*.md' \
            /tmp/deploy-hrms/ /hrms/;
          bye
          " 2>&1

          echo ""
          echo "============================================="
          echo "FULL DEPLOY COMPLETE — ${{ env.FILE_COUNT }} files uploaded"
          echo "============================================="
