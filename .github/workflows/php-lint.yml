name: PHP Syntax Check

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'php_payroll/**/*.php'
      - 'api/**/*.php'
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check PHP Syntax (php_payroll)
      run: |
        find php_payroll/ -name "*.php" -not -path "*/vendor/*" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true

    - name: Check PHP Syntax (ESS API)
      run: |
        find api/ -name "*.php" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true

    - name: Validate PHP Files Exist
      run: |
        PHP_PAYROLL_COUNT=$(find php_payroll/ -name "*.php" -not -path "*/vendor/*" | wc -l)
        ESS_API_COUNT=$(find api/ -name "*.php" | wc -l)
        echo "Found $PHP_PAYROLL_COUNT PHP files in php_payroll/"
        echo "Found $ESS_API_COUNT PHP files in api/"
        if [ "$PHP_PAYROLL_COUNT" -lt 10 ]; then
          echo "Warning: Very few PHP files found in php_payroll/"
        fi