name: Build & Deploy ESS

on:
  push:
    branches:
      - main
    paths:
      - 'RCS_ESS/**'
      - 'api/**'
      - '.github/workflows/deploy-ess.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: RCS_ESS
        run: bun install

      - name: Build static site (Vite)
        working-directory: RCS_ESS
        run: bun run build
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy frontend + API via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set net:reconnect-interval-multiplier 2;
            open -u '${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}' ${{ secrets.FTP_HOST }};

            # Deploy frontend (dist/ → FTP root = public_html/)
            lcd RCS_ESS/dist;
            mirror -R --no-symlinks --parallel=4 --no-perms --overwrite;

            # Deploy API PHP files (exclude config.php and .htaccess — managed manually on server)
            cd api/ess;
            lcd api/ess;
            mirror -R --no-symlinks --parallel=4 --no-perms --overwrite -x ^config\.php$ -x ^\.htaccess$;

            quit
          "
          echo "ESS Deploy completed"