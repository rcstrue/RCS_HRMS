name: Deploy PHP Admin via FTP

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'php_payroll/**'
      - 'database/**'
      - '.github/workflows/deploy-php.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Get changed files
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-files -- php_payroll/ database/)
            echo "Manual/first push — deploying all PHP & database files"
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- php_payroll/ database/)
            echo "Deploying only changed files"
          fi

          > /tmp/deploy_files.txt
          COUNT=0

          for file in $CHANGED; do
            [ -f "$file" ] || continue

            case "$file" in
              .git*|.github/*|*.md|node_modules/*|logs/*|upload/*|vendor/*)
                continue
                ;;
            esac

            echo "$file" >> /tmp/deploy_files.txt
            COUNT=$((COUNT + 1))
          done

          echo "DEPLOY_COUNT=$COUNT" >> $GITHUB_OUTPUT
          echo "Total files to upload: $COUNT"

      - name: Upload via FTP
        if: steps.changed.outputs.DEPLOY_COUNT != '0'
        run: |
          echo "Starting PHP Admin FTP Deploy..."

          SCRIPT="set ftp:ssl-allow no;
          set ftp:passive-mode on;
          set net:timeout 30;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;"

          while IFS= read -r file; do
            # Strip php_payroll/ or database/ prefix → upload to /hrms/
            RELATIVE="${file#php_payroll/}"
            RELATIVE="${RELATIVE#database/}"
            REMOTE_DIR="/hrms/$(dirname "$RELATIVE")"
            FILE_NAME=$(basename "$RELATIVE")

            echo "  $file → $REMOTE_DIR/$FILE_NAME"

            SCRIPT="$SCRIPT mkdir -p $REMOTE_DIR; put $file -o $REMOTE_DIR/$FILE_NAME;"
          done < /tmp/deploy_files.txt

          lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" ${{ secrets.FTP_HOST }} -e "$SCRIPT bye"

          echo "PHP Admin FTP Deploy Completed"

      - name: No changes
        if: steps.changed.outputs.DEPLOY_COUNT == '0'
        run: echo "No files changed — skipping deploy"