name: PHP Syntax Check

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check PHP Syntax
      run: |
        find . -name "*.php" -not -path "./vendor/*" -not -path "./.github/*" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true

    - name: Validate PHP Files Exist
      run: |
        PHP_COUNT=$(find . -name "*.php" -not -path "./vendor/*" | wc -l)
        echo "Found $PHP_COUNT PHP files"
        if [ "$PHP_COUNT" -lt 10 ]; then
          echo "Warning: Very few PHP files found"
        fi
